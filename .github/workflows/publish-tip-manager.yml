name: Publish Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'tip-manager-v*'

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false  # never use caching in release builds
      - run: corepack enable
      - run: corepack pnpm install
      - run: pnpm install
      - run: cp LICENSE packages/tip-manager/LICENSE
      - run: pnpm --filter @cmdforge/tip-manager publish --no-git-checks  # Or: npm stage publish